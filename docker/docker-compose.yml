version: "3.8"

services:
  postgres-orders:
    image: postgres:16.1
    container_name: cloud-marketplace-postgres-orders
    ports:
      - "15432:5432"

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db

    volumes:
      - orders-db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  orders-db-data:
